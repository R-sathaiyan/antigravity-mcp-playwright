# pytest.ini
# ==========
# Project-wide Pytest configuration for the QA Login Test Suite.
#
# Run the entire suite:
#   pytest
#
# Run headed (browser visible):
#   pytest
#
# Run headless:
#   pytest --headless
#
# Run a specific suite:
#   pytest tests/test_ui_elements.py -v
#
# Generate HTML report:
#   pytest --html=reports/report.html --self-contained-html
#
# Run with live console output:
#   pytest -s -v

[pytest]
# ── Test Discovery ─────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────
addopts =
    --tb=short
    -v
    -s
    --html=reports/test_report.html
    --self-contained-html

# ── Markers ─────────────────────────────────────────────────────────────────
markers =
    smoke:      Fast sanity checks — run on every commit
    regression: Full regression suite
    security:   Security-focused tests
    ui:         UI element validation tests
    positive:   Positive / happy-path login tests
    negative:   Negative / error-path login tests
    boundary:   Boundary and edge-case tests

# ── Logging ────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S
